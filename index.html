<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conteúdo Exclusivo</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #0a0a0a;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        width: 90%;
        max-width: 400px;
        background: #111;
        border: 2px solid #ff1a3c;
        border-radius: 20px;
        padding: 15px;
        text-align: center;
        box-shadow: 0 0 25px rgba(255, 0, 60, 0.6);
    }

    .banner {
        width: 100%;
        border-radius: 15px;
        margin-bottom: 15px;
    }

    .title {
        font-size: 22px;
        font-weight: bold;
        color: #ff1a3c;
        margin: 10px 0;
    }

    .live {
        font-size: 14px;
        color: #ccc;
        margin-bottom: 15px;
    }

    .live span {
        color: #ff3b5c;
        font-weight: bold;
    }

    .cta-text {
        font-size: 16px;
        font-weight: bold;
        color: #ff3b5c;
        margin-bottom: 15px;
        animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.6; }
        100% { opacity: 1; }
    }

    .btn {
        display: block;
        width: 80%;
        margin: 0 auto;
        padding: 14px;
        background: linear-gradient(45deg, #cc0029, #ff1a3c);
        color: white;
        font-size: 17px;
        font-weight: bold;
        text-decoration: none;
        border-radius: 30px;
        transition: 0.3s;
    }

    .btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 15px #ff1a3c;
    }

    .footer {
        margin-top: 12px;
        font-size: 12px;
        color: #888;
    }
</style>

</head>
<body>

<div class="container">

    <img src="SEU-BANNER-AQUI.jpg" class="banner">

    <div class="title">CONTEÚDO EXCLUSIVO 🔥</div>

    <div class="live">
        <span id="people">37</span> pessoas entrando agora...
    </div>

    <div class="cta-text">ÚLTIMAS VAGAS DO DIA</div>

    <a href="https://t.me/+vD9cMclPoyplOWVh" class="btn">
        ENTRAR AGORA →
    </a>

    <div class="footer">Conteúdo para maiores de 18 anos</div>

</div>

<script>
    let people = 37;

    setInterval(() => {
        let change = Math.floor(Math.random() * 5) - 2; // varia -2 a +2
        people += change;

        if (people < 25) people = 25;
        if (people > 68) people = 68;

        document.getElementById("people").innerText = people;
    }, 2000);
</script>

</body>
</html>
